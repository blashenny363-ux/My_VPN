  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0b1c3a 0%, #0a2540 50%, #051a30 100%);
      padding: 20px;
      transition: background 0.3s ease;
    }

    body.error-state {
      background: linear-gradient(145deg, #5a1010 0%, #831d1d 50%, #4f0a0a 100%);
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(66, 153, 225, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s ease;
      text-align: center;
      color: #e0f0ff;
    }

    body.error-state .container {
      box-shadow: 0 30px 50px rgba(80, 0, 0, 0.7), 0 0 0 1px rgba(255, 90, 90, 0.5);
      border-color: rgba(255, 70, 70, 0.4);
      background: rgba(20, 5, 5, 0.7);
    }

    h1 {
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.5px;
      margin-bottom: 2rem;
      color: white;
      text-shadow: 0 4px 12px rgba(0, 160, 255, 0.5);
    }

    body.error-state h1 {
      text-shadow: 0 4px 12px rgba(255, 60, 60, 0.7);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
    }

    label {
      text-align: left;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      color: #bed9ff;
    }

    .input-field {
      display: flex;
      align-items: center;
      background: rgba(10, 25, 50, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 0.2rem 0.2rem 0.2rem 1.8rem;
      border: 1.5px solid rgba(66, 153, 225, 0.5);
      transition: all 0.25s;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .input-field:focus-within {
      border-color: #3b9eff;
      box-shadow: 0 0 18px #1e6ef0;
    }

    body.error-state .input-field {
      border-color: rgba(255, 100, 100, 0.7);
      background: rgba(30, 5, 5, 0.8);
    }

    body.error-state .input-field:focus-within {
      box-shadow: 0 0 18px #c53030;
      border-color: #ff5e5e;
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 0.9rem 0.2rem;
      font-size: 1.2rem;
      font-weight: 500;
      color: #e6f0ff;
      outline: none;
      letter-spacing: 0.8px;
    }

    input::placeholder {
      color: rgba(180, 210, 255, 0.55);
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    .btn {
      background: #1e5bcf;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      cursor: pointer;
      background: linear-gradient(135deg, #1f6ed4, #0f4ba3);
      box-shadow: 0 10px 18px rgba(0, 100, 255, 0.4);
      transition: all 0.2s ease;
      letter-spacing: 0.6px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      width: 100%;
      text-transform: uppercase;
    }

    .btn:hover {
      background: linear-gradient(135deg, #2b7ae8, #1350c0);
      box-shadow: 0 14px 22px rgba(0, 120, 255, 0.6);
      transform: scale(1.02);
    }

    .btn:active {
      transform: scale(0.97);
    }

    body.error-state .btn {
      background: linear-gradient(135deg, #b33a3a, #7a2020);
      box-shadow: 0 10px 18px rgba(200, 30, 30, 0.5);
      border-color: rgba(255, 200, 200, 0.3);
    }

    .message-box {
      margin-top: 1.8rem;
      font-weight: 500;
      font-size: 1.1rem;
      min-height: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.2s;
      color: #c7e0ff;
      word-break: break-word;
    }

    .error-text {
      color: #ffa0a0;
      font-weight: 600;
      background: rgba(180, 0, 0, 0.2);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(8px);
    }

    body.error-state .error-text {
      color: #ffcece;
      background: rgba(180, 0, 0, 0.35);
    }

    .success-link {
      color: #b3f0c0;
      background: rgba(0, 100, 50, 0.3);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 3px;
      word-break: break-all;
    }

    .success-link:hover {
      color: #d0ffd0;
    }
  </style>
</head>

        clearErrorState();
        messageContainer.innerHTML = `
          <span style="color: #b3f0c0; font-weight: 500;">Вот ваша ссылка:</span>
          <a href="${SUCCESS_URL}" target="_blank" class="success-link" rel="noopener noreferrer">${SUCCESS_URL}</a>
        `;
      }

      function validateKey() {
        const rawKey = keyInput.value.trim();

        if (rawKey === '') {
          setErrorState('Введите ключ');
          keyInput.focus();
          return;
        }

        if (VALID_KEYS.has(rawKey)) {
          showSuccessMessage(rawKey);
        } else {
          setErrorState('Неверный ключ');
          keyInput.value = '';
          keyInput.focus();
        }
      }

      checkBtn.addEventListener('click', (e) => {
        e.preventDefault();
        validateKey();
      });

      keyInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          validateKey();
        }
      });

      keyInput.addEventListener('input', () => {
        if (bodyEl.classList.contains('error-state')) {
          clearErrorState();
          messageContainer.innerHTML = '';
        }
        if (keyInput.value.trim() === '' && messageContainer.innerHTML !== '') {
          messageContainer.innerHTML = '';
        }
      });

      window.addEventListener('load', () => {
        clearErrorState();
        keyInput.value = '';
        messageContainer.innerHTML = '';
        keyInput.focus();
      });
    })();
  </script>
</body>
</html>
